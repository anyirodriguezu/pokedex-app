name: EAS Build

on:
  pull_request:
    branches:
      - master

jobs:
  build-android:
    name: Android Preview Build (EAS cloud)
    runs-on: ubuntu-latest
    environment: env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          echo "::group::npm install"
          npm install --legacy-peer-deps
          echo "::endgroup::"
          echo "✅ Dependencies installed"

      - name: Install EAS CLI
        run: |
          npm install -g eas-cli
          echo "✅ EAS CLI version: $(eas --version)"

      - name: Build Android (preview – EAS cloud)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "🚀 Submitting build to Expo cloud..."
          eas build --platform android --profile preview --non-interactive
          echo "✅ Build completed"

      - name: Build complete — download link
        run: |
          echo "──────────────────────────────────────────────"
          echo "✅ APK generado correctamente en Expo."
          echo ""
          echo "📲 Descarga el APK desde el dashboard del proyecto:"
          echo "   https://expo.dev/accounts/anyirodriguezu/projects/pokedex-app/builds"
          echo "──────────────────────────────────────────────"

  build-ios:
    name: iOS Production Build (EAS cloud)
    runs-on: ubuntu-latest

    steps:
      - name: iOS build — not configured
        run: |
          echo "──────────────────────────────────────────────"
          echo "ℹ️  El build de iOS no está habilitado en este proyecto."
          echo ""
          echo "   Requiere cuenta de Apple Developer y certificados"
          echo "   configurados en EAS para ejecutarse correctamente."
          echo ""
          echo "   Para publicar en iOS se usaría:"
          echo "   eas build --platform ios --profile production"
          echo "──────────────────────────────────────────────"
